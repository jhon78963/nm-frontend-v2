<h1 class="text-2xl font-bold text-center text-blue-500">Novedades Maritex</h1>

<app-button 
  variant="primary" 
  icon="save" 
  [loading]="isSavingSignal()">
  Guardar Producto
</app-button>

<app-button 
  variant="danger" 
  icon="trash" 
  [loading]="isDeletingSignal()">
  Eliminar Registro
</app-button>

<app-button 
  variant="secondary" 
  (clicked)="closeModal()">
  Cancelar
</app-button>

<router-outlet />
