<div class="flex min-h-screen items-center justify-center bg-gray-50 px-4 py-12">
  <div class="w-full max-w-md space-y-8">
    <div class="text-center">
      <h1 class="text-3xl font-bold text-gray-900">
        Novedades <span class="text-orange-600">Maritex</span>
      </h1>
      <p class="mt-2 text-sm text-gray-600">Sistema ERP & POS</p>
      <h2 class="mt-6 text-2xl font-semibold text-gray-800">Iniciar sesión</h2>
    </div>

    <form class="mt-8 space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      @if (errorMessage()) {
        <div
          class="rounded-md border border-red-200 bg-red-50 p-4"
          role="alert"
          aria-live="assertive"
        >
          <div class="flex items-start gap-3">
            <svg
              class="h-5 w-5 shrink-0 text-red-600"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <p class="text-sm text-red-800">{{ errorMessage() }}</p>
          </div>
        </div>
      }

      <div class="space-y-4">
        <app-input
          type="text"
          label="Usuario"
          placeholder="Tu nombre de usuario"
          [formControl]="loginForm.controls.username"
          [errorMessage]="getErrorMessage('username')"
        />

        <app-input
          type="password"
          label="Contraseña"
          placeholder="Tu contraseña"
          [formControl]="loginForm.controls.password"
          [errorMessage]="getErrorMessage('password')"
        />
      </div>

      <div class="flex flex-col gap-4">
        <app-button type="submit" variant="primary" [loading]="isLoading()" [disabled]="isLoading()">
          Iniciar sesión
        </app-button>

        <a
          href="/auth/forgot-password"
          class="text-center text-sm text-gray-600 transition-colors hover:text-orange-600"
        >
          ¿Olvidaste tu contraseña?
        </a>
      </div>
    </form>
  </div>
</div>
