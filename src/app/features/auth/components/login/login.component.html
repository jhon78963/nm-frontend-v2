<div class="rounded-2xl border border-gray-200 bg-white p-8 shadow-sm">
  <div class="mb-8 text-center">
    <h2 class="text-2xl font-bold text-gray-900">Iniciar sesión</h2>
    <p class="mt-2 text-sm text-gray-500">
      Ingresa tus credenciales para acceder al sistema.
    </p>
  </div>

  <form class="space-y-5" (submit)="onSubmit($event)" novalidate>
    @if (errorMessage()) {
      <app-alert variant="error" [message]="errorMessage()" />
    }

    <app-input
      type="text"
      label="Usuario"
      placeholder="Tu nombre de usuario"
      autocomplete="username"
      [formField]="loginForm.username"
      [errorMessage]="usernameError()"
    />

    <app-input
      type="password"
      label="Contraseña"
      placeholder="Tu contraseña"
      autocomplete="current-password"
      [formField]="loginForm.password"
      [errorMessage]="passwordError()"
    />

    <div class="flex flex-col items-center gap-4 pt-2">
      <app-button
        type="submit"
        variant="primary"
        [loading]="isLoading()"
        [disabled]="isLoading()"
      >
        Iniciar sesión
      </app-button>

      <a
        routerLink="/auth/forgot-password"
        class="text-sm text-gray-600 transition-colors hover:text-orange-600 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-orange-500 focus-visible:ring-offset-2 rounded"
      >
        ¿Olvidaste tu contraseña?
      </a>
    </div>
  </form>
</div>
