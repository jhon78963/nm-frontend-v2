<div class="flex h-screen overflow-hidden bg-gray-50">
  @if (isMobileMenuOpen()) {
    <button
      type="button"
      class="fixed inset-0 z-40 bg-black/50 md:hidden"
      aria-label="Cerrar menú de navegación"
      (click)="closeMobileMenu()"
    ></button>
  }

  <aside
    id="main-navigation"
    class="fixed inset-y-0 left-0 z-50 flex h-full w-64 shrink-0 flex-col border-r border-gray-200 bg-white transition-transform duration-200 ease-in-out md:static md:translate-x-0"
    [class.-translate-x-full]="!isMobileMenuOpen()"
    [class.translate-x-0]="isMobileMenuOpen()"
    aria-label="Navegación principal"
  >
    <div class="border-b border-gray-200 px-6 py-5">
      <h1 class="text-lg font-bold text-gray-900">
        Novedades <span class="text-orange-600">Maritex</span>
      </h1>
      <p class="mt-1 text-xs text-gray-500">ERP &amp; POS</p>
    </div>

    <nav class="flex-1 overflow-y-auto px-3 py-4">
      @for (group of navItems; track group.label) {
        <div class="mb-4">
          <p class="px-3 pb-2 text-xs font-semibold uppercase tracking-wide text-gray-400">
            {{ group.label }}
          </p>
          <ul class="space-y-1">
            @for (item of group.items ?? []; track item.route) {
              <li>
                <a
                  [routerLink]="item.route"
                  routerLinkActive
                  #navLink="routerLinkActive"
                  [routerLinkActiveOptions]="{ exact: true }"
                  class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-100 hover:text-gray-900"
                  [class.bg-orange-50]="navLink.isActive"
                  [class.text-orange-600]="navLink.isActive"
                  [attr.aria-current]="navLink.isActive ? 'page' : null"
                  (click)="closeMobileMenu()"
                >
                  <span
                    class="h-1.5 w-1.5 shrink-0 rounded-full bg-gray-300"
                    [class.bg-orange-500]="navLink.isActive"
                    aria-hidden="true"
                  ></span>
                  {{ item.label }}
                </a>
              </li>
            }
          </ul>
        </div>
      }
    </nav>
  </aside>

  <div class="flex min-w-0 flex-1 flex-col overflow-hidden">
    <header
      class="flex h-16 shrink-0 items-center justify-between gap-4 border-b border-gray-200 bg-white px-4 md:px-6"
    >
      <div class="flex min-w-0 flex-1 items-center gap-3">
        <button
          type="button"
          class="inline-flex shrink-0 items-center justify-center rounded-md p-2 text-gray-600 transition-colors hover:bg-gray-100 hover:text-gray-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-orange-500 focus-visible:ring-offset-2 md:hidden"
          [attr.aria-expanded]="isMobileMenuOpen()"
          aria-controls="main-navigation"
          aria-label="Abrir menú de navegación"
          (click)="toggleMobileMenu()"
        >
          <svg
            class="h-6 w-6"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>

        <app-breadcrumb [paths]="breadcrumbPaths()" />
      </div>

      <div class="relative shrink-0">
        <button
          type="button"
          class="flex items-center gap-2 rounded-md p-1 transition-colors hover:bg-gray-100 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-orange-500 focus-visible:ring-offset-2"
          [attr.aria-expanded]="isProfileMenuOpen()"
          aria-haspopup="menu"
          aria-label="Menú de perfil de usuario"
          (click)="toggleProfileMenu()"
        >
          <span
            class="flex h-8 w-8 items-center justify-center rounded-full bg-orange-100 text-sm font-semibold text-orange-700"
            aria-hidden="true"
          >
            {{ userInitials() }}
          </span>
          <span class="hidden text-sm font-medium text-gray-700 sm:inline">{{ userDisplayName() }}</span>
        </button>

        @if (isProfileMenuOpen()) {
          <div
            class="absolute right-0 top-full z-50 mt-2 w-48 overflow-hidden rounded-md border border-gray-200 bg-white shadow-lg"
            role="menu"
            aria-label="Opciones de perfil"
          >
            <button
              type="button"
              class="flex w-full items-center gap-2 px-4 py-2.5 text-left text-sm text-gray-700 transition-colors hover:bg-gray-100"
              role="menuitem"
            >
              <svg
                class="h-4 w-4 shrink-0 text-gray-500"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              Editar perfil
            </button>

            <button
              type="button"
              class="flex w-full items-center gap-2 px-4 py-2.5 text-left text-sm text-red-600 transition-colors hover:bg-gray-100"
              role="menuitem"
              (click)="logout()"
            >
              <svg
                class="h-4 w-4 shrink-0"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
              Cerrar sesión
            </button>
          </div>
        }
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8">
      <router-outlet />
    </main>
  </div>
</div>
