<div class="flex min-h-screen">
  <!-- Brand panel -->
  <aside
    class="relative hidden w-[45%] overflow-hidden bg-gradient-to-br from-gray-900 via-gray-800 to-orange-950 lg:flex lg:flex-col lg:justify-between"
    aria-hidden="true"
  >
    <div class="absolute inset-0 opacity-20">
      <svg class="h-full w-full" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="auth-grid" width="32" height="32" patternUnits="userSpaceOnUse">
            <path d="M0 32V0h32" fill="none" stroke="white" stroke-width="0.5" />
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#auth-grid)" />
      </svg>
    </div>

    <div class="relative z-10 p-10">
      <p class="text-sm font-medium uppercase tracking-widest text-orange-400/90">
        Novedades Maritex
      </p>
      <h1 class="mt-4 text-4xl font-bold leading-tight text-white">
        Gestión integral<br />
        <span class="text-orange-400">retail & wholesale</span>
      </h1>
      <p class="mt-4 max-w-sm text-base leading-relaxed text-gray-300">
        Inventario, ventas, compras y administración en una sola plataforma.
      </p>
    </div>

    <div class="relative z-10 p-10">
      <p class="text-xs text-gray-400">{{ subtitle() }}</p>
    </div>
  </aside>

  <!-- Form panel -->
  <main class="flex flex-1 flex-col items-center justify-center bg-gray-50 px-4 py-12 sm:px-8">
    <div class="mb-8 text-center lg:hidden">
      <p class="text-2xl font-bold text-gray-900">
        Novedades <span class="text-orange-600">Maritex</span>
      </p>
      <p class="mt-1 text-sm text-gray-500">{{ subtitle() }}</p>
    </div>

    <div class="w-full max-w-md">
      <router-outlet />
    </div>
  </main>
</div>
