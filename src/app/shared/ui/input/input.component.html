<div class="input-wrapper">
  @if (label()) {
    <label class="input-label" [for]="inputId">
      {{ label() }}
    </label>
  }

  <div class="input-control" [class.input-control-password]="type() === 'password'">
    <input
      [class]="inputFieldClass()"
      [class.input-field-password]="type() === 'password'"
      [id]="inputId"
      [type]="currentType()"
      [value]="value()"
      [placeholder]="placeholder()"
      [disabled]="isDisabled()"
      [attr.aria-invalid]="errorMessage() ? true : null"
      [attr.aria-describedby]="errorMessage() ? errorMessageId : null"
      (input)="onInput($event)"
      (blur)="onBlur()"
    />

    @if (type() === 'password') {
      <button
        type="button"
        class="input-toggle"
        [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
        [attr.aria-pressed]="showPassword()"
        [disabled]="isDisabled()"
        (click)="toggleShowPassword()"
      >
        @if (showPassword()) {
          <svg
            class="input-toggle-icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path
              d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
            ></path>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        } @else {
          <svg
            class="input-toggle-icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        }
      </button>
    }
  </div>

  @if (errorMessage()) {
    <p class="input-error-text" [id]="errorMessageId" role="alert">
      {{ errorMessage() }}
    </p>
  }
</div>
